name: Test Runner → Pages

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/test-runner.yml'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  test:
    name: Test self-hosted runner
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 5

    steps:
      - name: System info
        run: |
          echo "Runner: $(hostname)"
          echo "OS: $(uname -a)"
          echo "CPUs: $(nproc)"
          echo "Memory: $(free -h | awk '/Mem:/{print $2}')"
          echo "Disk: $(df -h / | awk 'NR==2{print $4}') free"

      - name: Check Julia toolcache
        run: ls -la /opt/hostedtoolcache || echo "/opt/hostedtoolcache not found"

      - name: Build status page
        run: |
          mkdir -p site
          cat > site/index.html <<'HTML'
          <!DOCTYPE html>
          <html>
          <head><title>Runner Status</title>
          <style>
            body { font-family: monospace; max-width: 600px; margin: 40px auto; padding: 0 20px; }
            .ok { color: green; } pre { background: #f4f4f4; padding: 12px; overflow-x: auto; }
          </style>
          </head>
          <body>
          <h1>Self-Hosted Runner <span class="ok">✓ Online</span></h1>
          HTML

          echo "<pre>" >> site/index.html
          echo "Host:    $(hostname)" >> site/index.html
          echo "OS:      $(lsb_release -ds 2>/dev/null || uname -s)" >> site/index.html
          echo "Kernel:  $(uname -r)" >> site/index.html
          echo "CPUs:    $(nproc)" >> site/index.html
          echo "Memory:  $(free -h | awk '/Mem:/{print $2}')" >> site/index.html
          echo "Disk:    $(df -h / | awk 'NR==2{print $4}') free" >> site/index.html
          echo "Time:    $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> site/index.html
          echo "</pre>" >> site/index.html
          echo "</body></html>" >> site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    name: Deploy to Pages
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
